---
layout: default
---
<article class="post">
  <a href="{{ site.baseurl }}/" class="back-link">&larr; All posts</a>

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      <span>&middot;</span>
      <span>{{ content | number_of_words | divided_by: 200 | plus: 1 }} min read</span>
    </div>
  </header>

  {% if page.image %}
  <div class="post-hero">
    <img src="{{ page.image | prepend: site.baseurl }}" alt="{{ page.title }}">
  </div>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
